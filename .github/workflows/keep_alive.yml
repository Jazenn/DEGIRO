name: Keep App Alive

on:
  schedule:
    - cron: '0 */4 * * *' # Runs 6 times a day (every 4 hours)
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install playwright

      - name: Install Playwright Browser
        run: npx playwright install chromium --with-deps

      - name: Run Wake Up Logic
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            const url = 'https://dashboard-degiro.streamlit.app/';
            try {
              console.log('Navigating to ' + url + '...');
              // Use 'load' instead of 'networkidle' as websockets can interfere with networkidle
              await page.goto(url, { waitUntil: 'load', timeout: 60000 });
              
              const wakeUpButton = page.getByRole('button', { name: /Yes, get this app back up!/i });
              try {
                // Wait for up to 10 seconds for the button to appear
                await wakeUpButton.waitFor({ state: 'visible', timeout: 10000 });
                console.log('App is sleeping. Clicking \"Wake Up\" button...');
                await wakeUpButton.click();
                
                // Wait for the app to properly spin up so it stays awake
                console.log('Waiting for app to initialize...');
                await page.waitForTimeout(30000);
                console.log('Done waking up.');
              } catch (e) {
                console.log('Wake up button not found. App is likely already awake.');
                // Crucially, Streamlit needs a sustained connection for a short duration to register a legitimate view.
                // Closing immediately looks like a bot ping/bounce.
                console.log('Holding the connection open so Streamlit registers activity...');
                await page.waitForTimeout(20000);
                console.log('Done.');
              }
            } catch (error) {
              console.error('Error:', error);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
